<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画板 | ERROR-CORE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .logo-container {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            z-index: 1000;
        }
        
        .toolbar-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .error-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            margin-right: 10px;
        }
        
        .toolbar {
            position: relative;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 50%;
            border: 2px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            cursor: pointer;
            transition: all 0.4s ease;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .toolbar:hover {
            width: 200px;
            height: auto;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
        }
        
        .toolbar-icon {
            color: #ffd700;
            font-size: 1.5rem;
            transition: all 0.4s ease;
            z-index: 3;
        }
        
        .toolbar:hover .toolbar-icon {
            opacity: 0;
            transform: scale(0.5);
        }
        
        .toolbar-content {
            display: none;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .toolbar:hover .toolbar-content {
            display: flex;
            opacity: 1;
            transform: translateX(0);
        }
        
        .toolbar-item, .social-item {
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.3s ease;
        }
        
        .toolbar:hover .toolbar-item, 
        .toolbar:hover .social-item {
            opacity: 1;
            transform: translateX(0);
        }
        
        .toolbar-item:nth-child(1), .social-item:nth-child(1) {
            transition-delay: 0.1s;
        }
        
        .toolbar-item:nth-child(2), .social-item:nth-child(2) {
            transition-delay: 0.2s;
        }
        
        .toolbar-item:nth-child(3), .social-item:nth-child(3) {
            transition-delay: 0.3s;
        }
        
        .expanded-toolbar-icon {
            color: #ffd700;
            font-size: 1.5rem;
            transition: transform 0.8s linear;
            align-self: flex-end; /* 将图标放在右侧 */
            margin-top: 5px;
        }
        
        .toolbar:hover .expanded-toolbar-icon {
            animation: rotate360 0.8s linear;
        }
        
        @keyframes rotate360 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .toolbar-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 215, 0, 0.9);
            color: #8b0000;
            border: none;
            border-radius: 5px;
            padding: 8px 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            font-size: 0.9rem;
            min-width: 150px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }
        
        .toolbar-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }
        
        .toolbar-item:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }
        
        .toolbar-item:hover::before {
            left: 100%;
        }
        
        .toolbar-item:active {
            transform: translateY(1px) scale(0.98);
        }
        
        .social-item {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            background: white;
            color: #333;
            border: none;
            border-radius: 5px;
            padding: 8px 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            font-size: 0.9rem;
            min-width: 150px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }
        
        .social-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }
        
        .social-item:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }
        
        .social-item:hover::before {
            left: 100%;
        }
        
        .social-item:active {
            transform: translateY(1px) scale(0.98);
        }
        
        .social-item.douyin {
            background: linear-gradient(135deg, #fb5b3e, #ff0050);
            color: white;
        }
        
        .social-icon-small {
            width: 20px;
            height: 20px;
        }
        
        /* 社交媒体链接样式 */
        .social-links {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .social-link.bilibili {
            background: white;
        }

        .social-link.douyin {
            background: linear-gradient(135deg, #fb5b3e, #ff0050);
        }
        
        .social-icon {
            width: 60%;
            height: 60%;
            transition: all 0.3s ease;
        }
        
        .social-link.douyin .social-icon {
            filter: invert(1); /* 让SVG图标变为白色 */
        }

        .social-link:hover {
            transform: scale(1.2) rotate(10deg);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .social-link:hover .social-icon {
            transform: scale(1.1);
        }
        
        @media (max-width: 480px) {
            .social-links {
                bottom: 15px;
                right: 15px;
            }
            
            .social-link {
                width: 45px;
                height: 45px;
            }
            
            .social-icon {
                width: 60%;
                height: 60%;
            }
        }
        
        /* 画板容器 */
        .drawing-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 1000px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 1s ease-out;
        }
        
        .drawing-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .drawing-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }
        
        .drawing-subtitle {
            font-size: 1.2rem;
            color: rgba(51, 51, 51, 0.8);
            font-weight: 300;
        }
        
        /* 工具条 */
        .drawing-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(240, 240, 240, 0.8);
            border-radius: 10px;
            align-items: center;
        }
        
        .tool-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .tool-group label {
            font-weight: bold;
            color: #333;
        }
        
        .color-picker {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
        }
        
        .brush-size {
            width: 100px;
        }
        
        .tool-buttons {
            display: flex;
            gap: 10px;
        }
        
        .tool-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #ff9a00, #ff6a00, #ff9a00);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(255, 154, 0, 0.4);
        }
        
        .tool-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255, 154, 0, 0.6);
        }
        
        /* 画布容器 */
        .canvas-container {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            background: white;
            margin-bottom: 20px;
        }
        
        #drawingCanvas {
            cursor: crosshair;
        }
        
        /* 保存按钮 */
        .save-section {
            text-align: center;
            margin-top: 20px;
        }
        
        .save-btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.4);
            font-weight: bold;
        }
        
        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(76, 175, 80, 0.6);
        }
    </style>
</head>
<body>
    <!-- ERROR logo 圆形图片 -->
    <div class="logo-container">
        <img src="picture/error.png" alt="ERROR Logo" class="error-logo">
    </div>
    
    <!-- 右上角工具栏 -->
    <div class="toolbar-container">
        <div class="toolbar">
            <div class="toolbar-icon">⚙️</div>
            <div class="toolbar-content">
                <a href="index.html" class="toolbar-item">
                    <span>🏠</span>
                    <span>首页<br>Home</span>
                </a>
                <a href="contact.html" class="toolbar-item">
                    <span>📞</span>
                    <span>联系我们<br>Contact</span>
                </a>
                <a href="https://space.bilibili.com/3546631121144154?spm_id_from=333.1007.0.0" class="social-item" target="_blank">
                    <img src="picture/bilibili.svg" alt="Bilibili" class="social-icon-small">
                    <span>Bilibili<br>哔哩哔哩</span>
                </a>
                <a href="https://www.douyin.com/user/MS4wLjABAAAA0cxdKFB-D6ucvm2i3AE92bzBC-xSHgmW0ew1iwh0Isx-DwXKsMF499VcAle9571J?from_tab_name=main" class="social-item douyin" target="_blank">
                    <img src="picture/douyin.svg" alt="抖音" class="social-icon-small">
                    <span>抖音<br>Douyin</span>
                </a>
                <div class="expanded-toolbar-icon">⚙️</div>
            </div>
        </div>
    </div>
    
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- 星空粒子 -->
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <div class="drawing-container">
            <div class="drawing-header">
                <h1 class="drawing-title">🎨 画板<br>Drawing Board</h1>
                <p class="drawing-subtitle">在线绘画工具，可以绘制各种图案并保存为PNG格式<br>Online drawing tool, you can draw various patterns and save as PNG format</p>
            </div>
            
            <!-- 工具条 -->
            <div class="drawing-toolbar">
                <div class="tool-group">
                    <label for="colorPicker">颜色:</label>
                    <input type="color" id="colorPicker" value="#000000">
                </div>
                <div class="tool-group">
                    <label for="brushSize">画笔大小:</label>
                    <input type="range" id="brushSize" min="1" max="50" value="5">
                    <span id="brushSizeValue">5</span>
                </div>
                <div class="tool-buttons">
                    <button class="tool-btn" id="clearBtn">清空画布</button>
                </div>
            </div>
            
            <!-- 画布 -->
            <div class="canvas-container">
                <canvas id="drawingCanvas" width="800" height="500"></canvas>
            </div>
            
            <!-- 保存按钮 -->
            <div class="save-section">
                <button class="save-btn" id="saveBtn">💾 保存为PNG</button>
            </div>
        </div>
    </div>
    
    <!-- 社交媒体链接 -->
    <div class="social-links">
        <a href="https://space.bilibili.com/3546631121144154?spm_id_from=333.1007.0.0" class="social-link bilibili" target="_blank">
            <img src="picture/bilibili.svg" alt="Bilibili" class="social-icon">
        </a>
        <a href="https://www.douyin.com/user/MS4wLjABAAAA0cxdKFB-D6ucvm2i3AE92bzBC-xSHgmW0ew1iwh0Isx-DwXKsMF499VcAle9571J?from_tab_name=main" class="social-link douyin" target="_blank">
            <img src="picture/douyin.svg" alt="抖音" class="social-icon">
        </a>
    </div>

    <script>
        // 生成星空粒子
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }

        // 页面加载完成后隐藏加载动画
        window.addEventListener('load', function() {
            createStars();
            setTimeout(function() {
                const loadingOverlay = document.getElementById('loadingOverlay');
                loadingOverlay.style.opacity = '0';
                setTimeout(function() {
                    loadingOverlay.style.display = 'none';
                }, 500);
            }, 1000);
            
            // 画板功能
            const canvas = document.getElementById('drawingCanvas');
            const ctx = canvas.getContext('2d');
            const colorPicker = document.getElementById('colorPicker');
            const brushSize = document.getElementById('brushSize');
            const brushSizeValue = document.getElementById('brushSizeValue');
            const clearBtn = document.getElementById('clearBtn');
            const saveBtn = document.getElementById('saveBtn');
            
            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;
            
            // 设置初始画笔样式
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // 画笔大小变化事件
            brushSize.addEventListener('input', function() {
                brushSizeValue.textContent = this.value;
            });
            
            // 开始绘画
            function startDrawing(e) {
                isDrawing = true;
                [lastX, lastY] = getCoordinates(e);
            }
            
            // 绘画中
            function draw(e) {
                if (!isDrawing) return;
                
                const [currentX, currentY] = getCoordinates(e);
                
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(currentX, currentY);
                ctx.strokeStyle = colorPicker.value;
                ctx.lineWidth = brushSize.value;
                ctx.stroke();
                
                [lastX, lastY] = [currentX, currentY];
            }
            
            // 停止绘画
            function stopDrawing() {
                isDrawing = false;
            }
            
            // 获取鼠标/触摸坐标
            function getCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                if (e.type.includes('mouse')) {
                    return [e.clientX - rect.left, e.clientY - rect.top];
                } else if (e.type.includes('touch')) {
                    return [e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top];
                }
                return [0, 0];
            }
            
            // 事件监听
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
            
            // 触摸支持
            canvas.addEventListener('touchstart', startDrawing);
            canvas.addEventListener('touchmove', draw);
            canvas.addEventListener('touchend', stopDrawing);
            
            // 清空画布
            clearBtn.addEventListener('click', function() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });
            
            // 保存为PNG
            saveBtn.addEventListener('click', function() {
                // 创建一个新的canvas，添加白色背景
                const exportCanvas = document.createElement('canvas');
                exportCanvas.width = canvas.width;
                exportCanvas.height = canvas.height;
                const exportCtx = exportCanvas.getContext('2d');
                
                // 填充白色背景
                exportCtx.fillStyle = 'white';
                exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
                
                // 复制原画布内容
                exportCtx.drawImage(canvas, 0, 0);
                
                // 转换为PNG并下载
                const dataURL = exportCanvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'drawing.png';
                link.href = dataURL;
                link.click();
            });
        });
    </script>
</body>
</html>
