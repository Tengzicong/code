<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 | ERROR-CORE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            padding: 0;
        }
        
        /* 导航栏样式 */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .navbar-logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .navbar-links {
            display: flex;
            gap: 25px;
            list-style: none;
        }
        
        .navbar-links a {
            color: #333;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 20px;
        }
        
        .navbar-links a:hover {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .navbar-links a.active {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }
        
        .navbar-toggle {
            display: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: #333;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .navbar-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
                padding: 20px;
                gap: 15px;
                z-index: 99;
            }
            
            .navbar-links.show {
                display: flex;
            }
            
            .navbar-toggle {
                display: block;
            }
            
            .navbar {
                padding: 15px 20px;
            }
        }
        
        /* 主内容区域 */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* 联系页面样式 */
        .contact-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 60px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 800px;
            width: 100%;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        
        .contact-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #333;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .contact-subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #555;
            line-height: 1.6;
        }
        
        .contact-info {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        
        .contact-item.full-width {
            width: 100%;
            max-width: 600px;
        }
        
        .contact-item {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .contact-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }
        
        .contact-icon {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .contact-item h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #333;
        }
        
        .contact-item p {
            color: #666;
            line-height: 1.6;
        }
        
        .contact-form {
            margin-top: 40px;
            text-align: left;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            font-weight: bold;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.6);
        }
        
        .contact-note {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        .contact-note p {
            color: #666;
            line-height: 1.6;
            text-align: center;
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 6s infinite linear;
        }
        
        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">⚡ ERROR-CORE</a>
        <ul class="navbar-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="contact.html" class="active">联系我们</a></li>
        </ul>
        <div class="navbar-toggle">☰</div>
    </nav>
    
    <div class="particles" id="particles"></div>
    
    <div class="main-content">
        <div class="contact-section">
            <h1 class="contact-title">📧 联系我们</h1>
            <p class="contact-subtitle">如果您有任何问题或建议，欢迎随时联系我们，我们会尽快回复您。</p>
            
            <div class="contact-info">
                <div class="contact-item full-width">
                    <div class="contact-icon">✉️</div>
                    <h3>邮箱</h3>
                    <p>error-core@163.com</p>
                </div>
            </div>
            
            <div class="contact-note">
                <p>请通过邮箱联系我们，我们会尽快回复您的咨询。</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 导航栏响应式处理
            const navbarToggle = document.querySelector('.navbar-toggle');
            const navbarLinks = document.querySelector('.navbar-links');
            
            navbarToggle.addEventListener('click', function() {
                navbarLinks.classList.toggle('show');
            });
            
            // 创建背景粒子效果
            const particlesContainer = document.getElementById('particles');
            
            function createParticles() {
                const particleCount = 30;
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    
                    // 随机位置
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    
                    // 随机动画延迟和持续时间
                    particle.style.animationDelay = Math.random() * 6 + 's';
                    particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
                    
                    particlesContainer.appendChild(particle);
                }
            }
            
            // 初始化粒子效果
            createParticles();
        });
    </script>
</body>
</html>
