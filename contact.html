<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 | ERROR-CORE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .logo-container {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            z-index: 1000;
        }

        .toolbar-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .error-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            margin-right: 10px;
        }

        .toolbar {
            position: relative;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 50%;
            border: 2px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            cursor: pointer;
            transition: all 0.4s ease;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar:hover {
            width: 220px;
            height: auto;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
        }

        .toolbar-icon {
            color: #ffd700;
            font-size: 1.5rem;
            transition: all 0.4s ease;
            z-index: 3;
        }

        .toolbar:hover .toolbar-icon {
            opacity: 0;
            transform: scale(0.5);
        }

        .toolbar-content {
            display: none;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toolbar:hover .toolbar-content {
            display: flex;
            opacity: 1;
            transform: translateX(0);
        }

        .toolbar-item {
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.3s ease;
        }

        .toolbar:hover .toolbar-item,
        .toolbar:hover .social-item {
            opacity: 1;
            transform: translateX(0);
        }

        .toolbar-item:nth-child(1) { transition-delay: 0.1s; }
        .toolbar-item:nth-child(2) { transition-delay: 0.15s; }
        .toolbar-item:nth-child(3) { transition-delay: 0.2s; }
        .toolbar-item:nth-child(4) { transition-delay: 0.25s; }

        .expanded-toolbar-icon {
            color: #ffd700;
            font-size: 1.5rem;
            transition: transform 0.8s linear;
            align-self: flex-end;
            margin-top: 5px;
        }

        .toolbar:hover .expanded-toolbar-icon {
            animation: rotate360 0.8s linear;
        }

        @keyframes rotate360 {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .toolbar-item, .social-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 215, 0, 0.9);
            color: #8b0000;
            border: none;
            border-radius: 5px;
            padding: 8px 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            font-size: 0.9rem;
            min-width: 150px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .toolbar-item::before, .social-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }

        .toolbar-item:hover, .social-item:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        .toolbar-item:hover::before, .social-item:hover::before {
            left: 100%;
        }

        .toolbar-item:active, .social-item:active {
            transform: translateY(1px) scale(0.98);
        }

        .social-icon-small {
            width: 20px;
            height: 20px;
        }

        .contact-section {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            animation: fadeInUp 1s ease-out;
        }

        .contact-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            margin-bottom: 40px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        .contact-item:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }

        .contact-icon {
            font-size: 3rem;
            animation: bounce 2s infinite;
        }

        .contact-item h3 {
            color: #333;
            margin: 0 0 5px 0;
            font-size: 1.3rem;
        }

        .contact-item p {
            color: #666;
            margin: 0;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="picture/error.png" alt="ERROR Logo" class="error-logo">
    </div>

    <div class="toolbar-container">
        <div class="toolbar">
            <div class="toolbar-icon">⚙️</div>
            <div class="toolbar-content">
                <a href="index.html" class="toolbar-item">
                    <span>🏠</span>
                    <span>首页<br>Home</span>
                </a>
                <a href="contact.html" class="toolbar-item">
                    <span>📞</span>
                    <span>联系我们<br>Contact</span>
                </a>
                <a href="https://space.bilibili.com/3546631121144154" class="social-item" target="_blank">
                    <img src="picture/bilibili.svg" alt="Bilibili" class="social-icon-small">
                    <span>B站<br>Bilibili</span>
                </a>
                <a href="https://www.douyin.com/user/MS4wLjABAAAA0cxdKFB-D6ucvm2i3AE92bzBC-xSHgmW0ew1iwh0Isx-DwXKsMF499VcAle9571J" class="social-item" target="_blank">
                    <img src="picture/douyin.svg" alt="抖音" class="social-icon-small">
                    <span>抖音<br>Douyin</span>
                </a>
                <div class="expanded-toolbar-icon">⚙️</div>
            </div>
        </div>
    </div>

    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="contact-section">
            <h1 class="contact-title">📧 联系我们<br>Contact Us</h1>

            <div class="contact-item">
                <div class="contact-icon">✉️</div>
                <div>
                    <h3>邮箱</h3>
                    <p>error-core@163.com</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }

        window.addEventListener('load', function() {
            createStars();
        });
    </script>
</body>
</html>
